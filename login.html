<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ngozistes du Royaume</title>
    <meta name="description" content="Connectez-vous à votre espace membre Ngozistes du Royaume.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/favicon.ico">
    
    <!-- Configuration Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --dark-color: #010101;
            --light-color: #f4f4f4;
            --danger-color: #f44336;
            --success-color: #4CAF50;
            --text-color: #666;
            --border-radius: 8px;
            --box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            height: 60px;
            margin-bottom: 10px;
        }

        .logo span {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo-ngozistes {
            color: #ff0000;
        }

        .logo-royaume {
            color: #000000;
        }

        h1 {
            text-align: center;
            color: var(--dark-color);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 30px;
        }

        .alert {
            padding: 12px 15px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .alert.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .alert.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark-color);
            font-weight: 500;
        }

        .login-form .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .login-form .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-input-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--secondary-color);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .forgot-password:hover {
            text-decoration: underline;
            color: var(--primary-color);
        }

        .btn-login-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-login-submit:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-login-submit:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login-submit i {
            margin-right: 8px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .register-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @media screen and (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="images/logo/logo.png" alt="Logo Ngozistes du Royaume" onerror="this.src='https://via.placeholder.com/60x60?text=Logo'">
            <div>
                <span class="logo-ngozistes">Ngozistes</span> <span class="logo-royaume">du Royaume</span>
            </div>
        </div>
        
        <h1>Connexion</h1>
        <p class="subtitle">Accédez à votre espace membre</p>
        
        <div class="alert" id="login-alert"></div>
        
        <form class="login-form" id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" required placeholder="********" autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Afficher/masquer le mot de passe">
                        <i class="fas fa-eye" id="togglePasswordIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Se souvenir de moi</label>
                </div>
                <a href="#" class="forgot-password" id="forgotPassword">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-login-submit" id="login-btn">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>

            <div class="register-link">
                Pas encore membre ? <a href="adhesion.html">Adhérez maintenant</a>
            </div>
        </form>
    </div>

    <script>
        // Vérifier les paramètres d'URL
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            
            if (status === 'pending') {
                showAlert('Votre compte est en attente de validation par un administrateur', 'info');
            } else if (status === 'inactive') {
                showAlert('Votre compte a été désactivé. Contactez l\'administrateur.', 'error');
            }
            
            // Vérifier si déjà connecté
            const { user } = await window.AuthManager.getCurrentUser();
            if (user) {
                showAlert('Vous êtes déjà connecté. Redirection...', 'info');
                setTimeout(() => window.AuthManager.redirectToDashboard(), 1500);
            }
        })();

        // Remplir l'email si "Se souvenir de moi" était coché
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }

        // Toggle mot de passe
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                password.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Mot de passe oublié
        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            window.showToast('Veuillez contacter l\'administrateur pour réinitialiser votre mot de passe', 'info');
        });

        // Gestion de la connexion
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('login-btn');
            
            // Validation
            if (!email || !password) {
                showAlert('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            // Désactiver le bouton
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Connexion...';
            
            try {
                // Connexion avec Supabase Auth
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    showAlert('Email ou mot de passe incorrect', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                    
                    document.querySelector('.login-container').classList.add('shake');
                    setTimeout(() => {
                        document.querySelector('.login-container').classList.remove('shake');
                    }, 500);
                    return;
                }
                
                if (!data.user) {
                    throw new Error('Erreur de connexion');
                }
                
                // Récupérer les infos utilisateur
                const { data: userData, error: userError } = await window.supabase
                    .from('users')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (userError) {
                    throw userError;
                }
                
                // Vérifier le statut
                if (userData.role === 'pending') {
                    await window.supabase.auth.signOut();
                    showAlert('Votre compte est en attente de validation par un administrateur', 'info');
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                    return;
                }
                
                if (userData.status === 'inactive') {
                    await window.supabase.auth.signOut();
                    showAlert('Votre compte a été désactivé. Contactez l\'administrateur.', 'error');
                    
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                    return;
                }
                
                // Sauvegarder l'email si demandé
                if (remember) {
                    localStorage.setItem('rememberedEmail', email);
                } else {
                    localStorage.removeItem('rememberedEmail');
                }
                
                // Message de succès
                showAlert(`Connexion réussie ! Bienvenue ${userData.prenom || ''}`, 'success');
                
                // Redirection selon le rôle
                setTimeout(() => {
                    if (userData.role === 'admin' || userData.role === 'super_admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else if (userData.role === 'member') {
                        window.location.href = 'member/dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1500);
                
            } catch (error) {
                console.error('Erreur:', error);
                showAlert('Une erreur est survenue. Veuillez réessayer.', 'error');
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('login-alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert ${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
