<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Membre - Ngozistes du Royaume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/favicon.ico">
    
    <!-- Configuration Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    
    <script>
    // Enregistrer le service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(registration => {
                    console.log('ServiceWorker enregistré:', registration.scope);
                })
                .catch(error => {
                    console.log('Erreur ServiceWorker:', error);
                });
        });
    }

    // Détection de la connexion
    function checkConnection() {
        if (!navigator.onLine) {
            window.location.href = 'offline.html';
        }
    }
    window.addEventListener('load', checkConnection);
    window.addEventListener('offline', () => {
        window.location.href = 'offline.html';
    });
    setInterval(checkConnection, 30000);
    </script>

    <!-- Vérification d'authentification MEMBRE -->
    <script>
        (async function() {
            try {
                console.log('Vérification authentification membre...');
                
                // 1. Vérifier d'abord dans sessionStorage
                const storedUser = sessionStorage.getItem('currentUser');
                if (storedUser) {
                    const user = JSON.parse(storedUser);
                    console.log('Utilisateur trouvé dans sessionStorage:', user);
                    
                    if (user.role === 'member') {
                        window.currentUser = user;
                        console.log('✅ Membre authentifié depuis sessionStorage:', user.prenom);
                        return; // OK, on continue
                    } else if (user.role === 'admin' || user.role === 'super_admin') {
                        // Si c'est un admin, rediriger vers admin dashboard
                        window.location.href = '../admin/dashboard.html';
                        return;
                    }
                }
                
                // 2. Sinon, vérifier avec Supabase Auth
                const { data: { session } } = await window.supabase.auth.getSession();
                
                if (!session) {
                    console.log('❌ Pas de session, redirection vers login');
                    window.location.href = '../login.html';
                    return;
                }
                
                // 3. Récupérer les infos depuis la table users
                const { data: userData, error } = await window.supabase
                    .from('users')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();
                
                if (error || !userData) {
                    console.log('❌ Utilisateur non trouvé, redirection vers login');
                    window.location.href = '../login.html';
                    return;
                }
                
                // 4. Vérifier le rôle
                if (userData.role === 'admin' || userData.role === 'super_admin') {
                    // Si c'est un admin, rediriger vers admin dashboard
                    window.location.href = '../admin/dashboard.html';
                    return;
                }
                
                if (userData.role !== 'member') {
                    console.log('❌ Pas les droits membre, redirection vers index');
                    window.location.href = '../index.html';
                    return;
                }
                
                if (userData.status !== 'active') {
                    console.log('❌ Compte inactif, redirection vers index');
                    window.location.href = '../index.html';
                    return;
                }
                
                // 5. Stocker l'utilisateur pour les autres pages
                window.currentUser = userData;
                sessionStorage.setItem('currentUser', JSON.stringify(userData));
                console.log('✅ Membre authentifié depuis Supabase:', userData.prenom);
                
            } catch (error) {
                console.error('❌ Erreur auth:', error);
                window.location.href = '../login.html';
            }
        })();
    </script>
    
    <style>
        /* Styles du dashboard membre - simplifiés */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --dark-color: #010101;
            --light-color: #f4f4f4;
            --danger-color: #f44336;
            --success-color: #4CAF50;
            --text-color: #666;
            --border-radius: 8px;
            --box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: #f5f5f5;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .sidebar-header img {
            height: 60px;
            margin-bottom: 10px;
        }

        .user-info {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid var(--primary-color);
            object-fit: cover;
        }

        .sidebar-nav ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .sidebar-nav a i {
            width: 25px;
            margin-right: 10px;
        }

        .sidebar-nav li.active a,
        .sidebar-nav a:hover {
            background: var(--primary-color);
            color: white;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .logout {
            display: flex;
            align-items: center;
            color: var(--danger-color);
            text-decoration: none;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        .content-header h1 {
            color: var(--dark-color);
            font-size: 1.8rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .user-menu:hover {
            background: var(--light-color);
        }

        .user-menu img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        /* Stats Cards */
        .member-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .member-stat-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: var(--transition);
        }

        .member-stat-card:hover {
            transform: translateY(-5px);
        }

        .member-stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
        }

        .member-stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-color);
        }

        .dashboard-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--box-shadow);
        }

        .dashboard-section h2 {
            color: var(--dark-color);
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--light-color);
            border-radius: var(--border-radius);
        }

        .event-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .event-date-badge {
            min-width: 60px;
            height: 60px;
            background: var(--primary-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--border-radius);
        }

        .event-date-badge .day {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .event-date-badge .month {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .view-all {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--primary-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
            font-style: italic;
        }

        /* Responsive */
        @media screen and (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            
            .member-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../images/logo/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50x50?text=Logo'">
                <h3><span class="logo-ngozistes">Ngozistes</span> <span class="logo-royaume">du Royaume</span></h3>
            </div>
            
            <div class="user-info" id="user-info">
                <img src="../images/default-avatar.png" alt="Avatar" class="user-avatar" id="user-avatar">
                <h4 id="user-name">Chargement...</h4>
                <p id="user-role">Membre</p>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#" onclick="showPanel('dashboard'); return false;"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a></li>
                    <li><a href="#" onclick="showPanel('events'); return false;"><i class="fas fa-calendar-alt"></i> Événements</a></li>
                    <li><a href="#" onclick="showPanel('profile'); return false;"><i class="fas fa-user"></i> Mon profil</a></li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" onclick="logout()" class="logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Espace Membre</h1>
                <div class="header-actions">
                    <span class="user-menu" onclick="toggleUserMenu()">
                        <img src="../images/default-avatar.png" alt="Avatar" id="header-avatar">
                        <i class="fas fa-chevron-down"></i>
                    </span>
                </div>
            </header>

            <!-- Dashboard Panel -->
            <div id="dashboard-panel" class="admin-panel active">
                <div class="member-stats" id="member-stats">
                    <div class="loading">Chargement...</div>
                </div>

                <div class="dashboard-section">
                    <h2><i class="fas fa-calendar-alt"></i> Mes prochains événements</h2>
                    <div class="events-list" id="member-events">
                        <div class="loading">Chargement...</div>
                    </div>
                    <a href="#" class="view-all" onclick="showPanel('events'); return false;">Voir tous mes événements →</a>
                </div>
            </div>

            <!-- Events Panel -->
            <div id="events-panel" class="admin-panel" style="display: none;">
                <h2>Mes événements</h2>
                <div class="events-list" id="my-events-list">
                    <div class="loading">Chargement...</div>
                </div>
            </div>

            <!-- Profile Panel -->
            <div id="profile-panel" class="admin-panel" style="display: none;">
                <h2>Mon profil</h2>
                <div id="profile-content">
                    <div class="loading">Chargement...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== VARIABLES GLOBALES ====================
        let currentUser = window.currentUser || null;

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.currentUser) {
                window.location.href = '../login.html';
                return;
            }
            
            currentUser = window.currentUser;
            await updateUI();
            await loadDashboard();
        });

        // ==================== MISE À JOUR DE L'INTERFACE ====================
        async function updateUI() {
            if (!currentUser) return;
            
            document.getElementById('user-name').textContent = `${currentUser.prenom || ''} ${currentUser.nom || ''}`.trim() || 'Membre';
            
            if (currentUser.photo) {
                document.getElementById('user-avatar').src = currentUser.photo;
                document.getElementById('header-avatar').src = currentUser.photo;
            }
        }

        // ==================== CHARGEMENT DU DASHBOARD ====================
        async function loadDashboard() {
            try {
                // Récupérer les inscriptions de l'utilisateur
                const { data: registrations } = await window.supabase
                    .from('event_registrations')
                    .select(`
                        *,
                        events (*)
                    `)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'confirmed');
                
                const upcomingRegistrations = registrations?.filter(r => 
                    r.events && new Date(r.events.date) > new Date()
                ) || [];
                
                // Stats
                const statsContainer = document.getElementById('member-stats');
                statsContainer.innerHTML = `
                    <div class="member-stat-card">
                        <div class="member-stat-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="member-stat-details">
                            <h3>Événements à venir</h3>
                            <span class="member-stat-number">${upcomingRegistrations.length}</span>
                        </div>
                    </div>
                    <div class="member-stat-card">
                        <div class="member-stat-icon">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="member-stat-details">
                            <h3>Membre depuis</h3>
                            <span class="member-stat-number">${currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString('fr-FR') : '-'}</span>
                        </div>
                    </div>
                `;
                
                // Événements à venir
                const eventsContainer = document.getElementById('member-events');
                if (upcomingRegistrations.length > 0) {
                    const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
                    
                    eventsContainer.innerHTML = upcomingRegistrations.slice(0, 3).map(reg => {
                        const event = reg.events;
                        if (!event) return '';
                        
                        const eventDate = new Date(event.date);
                        
                        return `
                            <div class="event-item">
                                <div class="event-info">
                                    <div class="event-date-badge">
                                        <span class="day">${eventDate.getDate()}</span>
                                        <span class="month">${months[eventDate.getMonth()]}</span>
                                    </div>
                                    <div class="event-details">
                                        <h3>${event.title || ''}</h3>
                                        <p><i class="fas fa-map-marker-alt"></i> ${event.location || 'Lieu à définir'}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    eventsContainer.innerHTML = '<p class="no-data">Aucun événement à venir</p>';
                }
                
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        // ==================== NAVIGATION ====================
        window.showPanel = function(panelName) {
            document.querySelectorAll('.admin-panel').forEach(p => p.style.display = 'none');
            document.getElementById(panelName + '-panel').style.display = 'block';
            
            document.querySelectorAll('.sidebar-nav li').forEach(li => li.classList.remove('active'));
            if (event && event.target) {
                const li = event.target.closest('li');
                if (li) li.classList.add('active');
            }
            
            if (panelName === 'events') loadMyEvents();
            if (panelName === 'profile') loadProfile();
        };

        window.toggleUserMenu = function() {
            // Menu simple - pourrait être amélioré
            alert('Menu utilisateur - Fonctionnalité en développement');
        };

        // ==================== CHARGEMENT DES ÉVÉNEMENTS ====================
        async function loadMyEvents() {
            const container = document.getElementById('my-events-list');
            
            try {
                const { data: registrations } = await window.supabase
                    .from('event_registrations')
                    .select(`
                        *,
                        events (*)
                    `)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'confirmed');
                
                const events = registrations?.map(r => r.events).filter(e => e) || [];
                
                if (events.length > 0) {
                    const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
                    
                    container.innerHTML = events.map(event => {
                        const eventDate = new Date(event.date);
                        return `
                            <div class="event-item">
                                <div class="event-info">
                                    <div class="event-date-badge">
                                        <span class="day">${eventDate.getDate()}</span>
                                        <span class="month">${months[eventDate.getMonth()]}</span>
                                    </div>
                                    <div class="event-details">
                                        <h3>${event.title || ''}</h3>
                                        <p><i class="fas fa-map-marker-alt"></i> ${event.location || 'Lieu à définir'}</p>
                                        <p><i class="fas fa-clock"></i> ${eventDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<p class="no-data">Aucune inscription à un événement</p>';
                }
            } catch (error) {
                console.error('Erreur:', error);
                container.innerHTML = '<p class="error">Erreur de chargement</p>';
            }
        }

        // ==================== CHARGEMENT DU PROFIL ====================
        function loadProfile() {
            const container = document.getElementById('profile-content');
            
            container.innerHTML = `
                <div style="background: white; padding: 30px; border-radius: var(--border-radius);">
                    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
                        <img src="${currentUser.photo || '../images/default-avatar.png'}" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color);">
                        <div>
                            <h2 style="color: var(--dark-color);">${currentUser.prenom || ''} ${currentUser.nom || ''}</h2>
                            <p style="color: var(--primary-color);">Membre</p>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div style="padding: 15px; background: var(--light-color); border-radius: var(--border-radius);">
                            <p><strong>Email:</strong> ${currentUser.email || '-'}</p>
                        </div>
                        <div style="padding: 15px; background: var(--light-color); border-radius: var(--border-radius);">
                            <p><strong>Téléphone:</strong> ${currentUser.telephone || '-'}</p>
                        </div>
                        <div style="padding: 15px; background: var(--light-color); border-radius: var(--border-radius);">
                            <p><strong>Ville:</strong> ${currentUser.ville || '-'}</p>
                        </div>
                        <div style="padding: 15px; background: var(--light-color); border-radius: var(--border-radius);">
                            <p><strong>Membre depuis:</strong> ${currentUser.created_at ? new Date(currentUser.created_at).toLocaleDateString() : '-'}</p>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 15px; background: var(--light-color); border-radius: var(--border-radius);">
                        <p><strong>Motivation:</strong> ${currentUser.motivation || 'Non renseignée'}</p>
                    </div>
                </div>
            `;
        }

        // ==================== DÉCONNEXION ====================
        window.logout = async function() {
            try {
                await window.supabase.auth.signOut();
                sessionStorage.removeItem('currentUser');
                localStorage.removeItem('rememberedEmail');
                window.location.href = '../index.html';
            } catch (error) {
                console.error('Erreur déconnexion:', error);
            }
        };
    </script>
</body>
</html>
