<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Membre - Ngozistes du Royaume</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/favicon.ico">
    
    <!-- Configuration Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --dark-color: #010101;
            --light-color: #f4f4f4;
            --danger-color: #f44336;
            --success-color: #4CAF50;
            --text-color: #666;
            --border-radius: 8px;
            --box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: #f5f5f5;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .sidebar-header img {
            height: 60px;
            margin-bottom: 10px;
        }

        .sidebar-header h3 {
            font-size: 1.2rem;
        }

        .sidebar-header .logo-ngozistes {
            color: #ff0000;
        }

        .sidebar-header .logo-royaume {
            color: #000000;
        }

        .user-info {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid var(--primary-color);
            object-fit: cover;
        }

        .user-info h4 {
            color: var(--dark-color);
            margin-bottom: 5px;
        }

        .user-info p {
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .sidebar-nav ul {
            list-style: none;
            padding: 20px 0;
        }

        .sidebar-nav li {
            margin-bottom: 5px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .sidebar-nav a i {
            width: 25px;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .sidebar-nav li.active a,
        .sidebar-nav a:hover {
            background: var(--primary-color);
            color: white;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .logout {
            display: flex;
            align-items: center;
            color: var(--danger-color);
            text-decoration: none;
            padding: 10px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .logout:hover {
            background: #ffebee;
        }

        .logout i {
            width: 25px;
            margin-right: 10px;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        .content-header h1 {
            color: var(--dark-color);
            font-size: 1.8rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .notification-badge .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .user-menu:hover {
            background: var(--light-color);
        }

        .user-menu img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .user-name {
            font-weight: 500;
            color: var(--dark-color);
        }

        .dropdown-menu {
            position: absolute;
            top: 70px;
            right: 30px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            min-width: 200px;
            z-index: 200;
            display: none;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            color: var(--text-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .dropdown-item:hover {
            background: var(--light-color);
            color: var(--primary-color);
        }

        .dropdown-item i {
            width: 20px;
        }

        .dropdown-item.logout {
            color: var(--danger-color);
        }

        .dropdown-divider {
            height: 1px;
            background: #eee;
            margin: 8px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            box-shadow: var(--box-shadow);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .dashboard-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--box-shadow);
        }

        .dashboard-section h2 {
            color: var(--dark-color);
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-section h2 i {
            color: var(--primary-color);
        }

        .profile-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-item {
            padding: 10px;
            background: var(--light-color);
            border-radius: var(--border-radius);
        }

        .info-item label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .info-item span {
            font-size: 1rem;
            color: var(--dark-color);
            font-weight: 500;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--light-color);
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .event-item:hover {
            transform: translateX(5px);
            background: #e8f5e9;
        }

        .event-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .event-date-badge {
            min-width: 60px;
            height: 60px;
            background: var(--primary-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--border-radius);
        }

        .event-date-badge .day {
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .event-date-badge .month {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .event-details h4 {
            color: var(--dark-color);
            margin-bottom: 5px;
        }

        .event-details p {
            font-size: 0.9rem;
            color: var(--text-color);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
            font-size: 1.1rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-left: 10px;
            border: 2px solid var(--primary-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-color);
            font-style: italic;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: var(--danger-color);
        }

        @media screen and (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1000;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            
            .content-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .content-header h1 {
                font-size: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .profile-info {
                grid-template-columns: 1fr;
            }
            
            .event-info {
                flex-direction: column;
                text-align: center;
            }
            
            .event-date-badge {
                margin: 0 auto;
            }
        }

        @media screen and (max-width: 480px) {
            .main-content {
                padding: 15px;
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-card .number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="../images/logo/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50x50?text=Logo'">
                <h3><span class="logo-ngozistes">Ngozistes</span> <span class="logo-royaume">du Royaume</span></h3>
            </div>
            
            <div class="user-info" id="user-info">
                <img src="../images/default-avatar.png" alt="Avatar" class="user-avatar" id="user-avatar">
                <h4 id="user-name">Chargement...</h4>
                <p id="user-role">Membre</p>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#" onclick="showPanel('dashboard'); return false;"><i class="fas fa-tachometer-alt"></i> Tableau de bord</a></li>
                    <li><a href="#" onclick="showPanel('profile'); return false;"><i class="fas fa-user"></i> Mon profil</a></li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <a href="#" onclick="logout()" class="logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="page-title">Tableau de bord</h1>
                <div class="header-actions">
                    <span class="notification-badge" onclick="showNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notification-count">0</span>
                    </span>
                    <span class="user-menu" onclick="toggleUserMenu()">
                        <img src="../images/default-avatar.png" alt="Avatar" class="user-avatar-small" id="header-avatar">
                        <span class="user-name" id="header-name">Chargement...</span>
                        <i class="fas fa-chevron-down"></i>
                    </span>
                </div>
            </header>

            <!-- User Menu Dropdown -->
            <div class="dropdown-menu" id="user-dropdown">
                <a href="#" class="dropdown-item" onclick="viewProfile()">
                    <i class="fas fa-user"></i> Mon profil
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </a>
            </div>

            <!-- Dashboard Panel -->
            <div id="dashboard-panel" class="admin-panel">
                <div class="loading">Chargement du tableau de bord...</div>
            </div>

            <!-- Profile Panel -->
            <div id="profile-panel" class="admin-panel" style="display: none;">
                <div class="loading">Chargement du profil...</div>
            </div>
        </main>
    </div>

    <script>
        // ==================== VÉRIFICATION D'AUTHENTIFICATION ====================
        (async function() {
            try {
                console.log('🔐 Vérification authentification membre...');
                
                const user = await window.AuthManager.requireAuth(['member']);
                
                if (!user) return;
                
                window.currentUser = user;
                
                document.getElementById('user-name').textContent = `${user.prenom || ''} ${user.nom || ''}`.trim() || 'Membre';
                document.getElementById('header-name').textContent = `${user.prenom || ''} ${user.nom || ''}`.trim() || 'Membre';
                document.getElementById('user-role').textContent = 'Membre';
                
                if (user.photo) {
                    document.getElementById('user-avatar').src = user.photo;
                    document.getElementById('header-avatar').src = user.photo;
                }
                
                console.log('✅ Membre authentifié:', user.prenom);
                
                await loadDashboard();
                
            } catch (error) {
                console.error('❌ Erreur fatale:', error);
            }
        })();

        // ==================== CHARGEMENT DU DASHBOARD ====================
        async function loadDashboard() {
            const panel = document.getElementById('dashboard-panel');
            panel.innerHTML = '<div class="loading">Chargement...</div>';
            
            try {
                // Récupérer les inscriptions aux événements
                const { data: registrations } = await window.supabase
                    .from('event_registrations')
                    .select(`
                        *,
                        events (*)
                    `)
                    .eq('user_id', window.currentUser.id)
                    .order('registered_at', { ascending: false });
                
                const upcomingRegistrations = registrations?.filter(r => 
                    r.events && new Date(r.events.date) > new Date()
                ) || [];
                
                panel.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="number">${upcomingRegistrations.length}</span>
                            <span class="label">Événements à venir</span>
                        </div>
                        <div class="stat-card">
                            <span class="number">${registrations?.length || 0}</span>
                            <span class="label">Inscriptions totales</span>
                        </div>
                    </div>

                    <div class="dashboard-section">
                        <h2><i class="fas fa-user"></i> Bienvenue, ${window.currentUser.prenom || ''} !</h2>
                        <div class="profile-info">
                            <div class="info-item">
                                <label>Email</label>
                                <span>${window.currentUser.email || 'Non renseigné'}</span>
                            </div>
                            <div class="info-item">
                                <label>Téléphone</label>
                                <span>${window.currentUser.telephone || 'Non renseigné'}</span>
                            </div>
                            <div class="info-item">
                                <label>Ville</label>
                                <span>${window.currentUser.ville || 'Non renseignée'}</span>
                            </div>
                            <div class="info-item">
                                <label>Membre depuis</label>
                                <span>${window.currentUser.created_at ? new Date(window.currentUser.created_at).toLocaleDateString('fr-FR') : '-'}</span>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-section">
                        <h2><i class="fas fa-calendar-alt"></i> Mes prochains événements</h2>
                        <div class="events-list" id="events-list">
                            ${upcomingRegistrations.length > 0 ? 
                                upcomingRegistrations.map(reg => {
                                    const event = reg.events;
                                    const eventDate = new Date(event.date);
                                    const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
                                    
                                    return `
                                        <div class="event-item">
                                            <div class="event-info">
                                                <div class="event-date-badge">
                                                    <span class="day">${eventDate.getDate()}</span>
                                                    <span class="month">${months[eventDate.getMonth()]}</span>
                                                </div>
                                                <div class="event-details">
                                                    <h4>${event.title}</h4>
                                                    <p><i class="fas fa-map-marker-alt"></i> ${event.location || 'Lieu à définir'}</p>
                                                </div>
                                            </div>
                                            <span class="status-badge">Confirmé</span>
                                        </div>
                                    `;
                                }).join('') : 
                                '<p class="no-data">Aucun événement à venir</p>'
                            }
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Erreur:', error);
                panel.innerHTML = '<p class="error">Erreur de chargement du tableau de bord</p>';
            }
        }

        // ==================== CHARGEMENT DU PROFIL ====================
        async function loadProfile() {
            const panel = document.getElementById('profile-panel');
            
            const user = window.currentUser;
            const metadata = user.metadata || {};
            
            panel.innerHTML = `
                <div class="dashboard-section">
                    <h2><i class="fas fa-user-circle"></i> Mon profil</h2>
                    
                    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
                        <img src="${user.photo || '../images/default-avatar.png'}" 
                             style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color);">
                        <div>
                            <h3 style="color: var(--dark-color); margin-bottom: 5px;">${user.prenom || ''} ${user.nom || ''}</h3>
                            <p style="color: var(--text-color);">Membre depuis ${user.created_at ? new Date(user.created_at).toLocaleDateString('fr-FR') : '-'}</p>
                        </div>
                    </div>

                    <div class="profile-info">
                        <div class="info-item">
                            <label>Email</label>
                            <span>${user.email || ''}</span>
                        </div>
                        <div class="info-item">
                            <label>Téléphone</label>
                            <span>${user.telephone || 'Non renseigné'}</span>
                        </div>
                        <div class="info-item">
                            <label>Ville</label>
                            <span>${user.ville || 'Non renseignée'}</span>
                        </div>
                        <div class="info-item">
                            <label>Newsletter</label>
                            <span>${user.newsletter ? 'Abonné' : 'Non abonné'}</span>
                        </div>
                    </div>

                    <div class="dashboard-section" style="margin-top: 20px;">
                        <h3>Ma motivation</h3>
                        <p style="background: var(--light-color); padding: 15px; border-radius: var(--border-radius);">
                            ${user.motivation || 'Aucune motivation renseignée'}
                        </p>
                    </div>

                    ${metadata.lycee_technique ? `
                        <div class="dashboard-section">
                            <h3>Parcours technique</h3>
                            <div class="profile-info">
                                <div class="info-item">
                                    <label>Lycée</label>
                                    <span>${metadata.nom_lycee || '-'}</span>
                                </div>
                                <div class="info-item">
                                    <label>Filière</label>
                                    <span>${metadata.filiere || '-'}</span>
                                </div>
                                <div class="info-item">
                                    <label>Année de départ</label>
                                    <span>${metadata.annee_depart || '-'}</span>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // ==================== GESTION DES PANNEAUX ====================
        window.showPanel = function(panelName) {
            document.querySelectorAll('.admin-panel').forEach(p => p.style.display = 'none');
            document.getElementById(panelName + '-panel').style.display = 'block';
            
            document.querySelectorAll('.sidebar-nav li').forEach(li => li.classList.remove('active'));
            if (event && event.target) {
                event.target.closest('li').classList.add('active');
            }
            
            document.getElementById('page-title').textContent = 
                panelName === 'dashboard' ? 'Tableau de bord' : 'Mon profil';
            
            if (panelName === 'profile') loadProfile();
        };

        // ==================== FONCTIONS UTILITAIRES ====================
        window.toggleUserMenu = function() {
            document.getElementById('user-dropdown').classList.toggle('show');
        };

        window.viewProfile = function() {
            showPanel('profile');
        };

        window.showNotifications = function() {
            window.showToast('Notifications en développement', 'info');
        };

        // Fermer le menu en cliquant ailleurs
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('user-dropdown');
            const userMenu = document.querySelector('.user-menu');
            if (menu && userMenu && !userMenu.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('show');
            }
        });
    </script>
</body>
</html>
